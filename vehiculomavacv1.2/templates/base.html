<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cotizador Vehiculares{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='img/mavaclogoparte2.png') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="barra-lateral">
        <div class="nombre-pagina" style="margin-top: 25px;">
            <img id="cloud" src="{{ url_for('static', filename='img/mavaclogoparte2.png') }}"
                 width="50px" height="50px">
            <span>
                <img src="{{ url_for('static', filename='img/mavaclogoparte1.png') }}"
                     width="170px" height="60px">
            </span>
        </div>
        <nav class="navegacion">
            <ul style="padding-left: 0px;">
                <li>
                    <a href="{{ url_for('cotizador.cotizador') }}">
                        <img src="{{ url_for('static', filename='img/vidaley.png') }}"
                             style="width:35px;height:35px;margin-right:8px;margin-left:8px;">
                        <span>Cotizador</span>
                    </a>
                </li>
                <li>
                    <a href="{{ url_for('historial.historial') }}">
                        <img src="{{ url_for('static', filename='img/vidaley.png') }}"
                             style="width:35px;height:35px;margin-right:8px;margin-left:8px;">
                        <span>Historial</span>
                    </a>
                </li>
                <li>
                    <a href="{{ url_for('index.index') }}">
                        <img src="{{ url_for('static', filename='img/vidaley.png') }}"
                             style="width:35px;height:35px;margin-right:8px;margin-left:8px;">
                        <span>Datos</span>
                    </a>
                </li>
                <li>
                    <a href="{{ url_for('vehiculos.vehiculos') }}">
                        <img src="{{ url_for('static', filename='img/vidaley.png') }}"
                             style="width:35px;height:35px;margin-right:8px;margin-left:8px;">
                        <span>Vehículos</span>
                    </a>
                </li>
                <li>
                    <a href="{{ url_for('tasas.tasas') }}">
                        <img src="{{ url_for('static', filename='img/vidaley.png') }}"
                             style="width:35px;height:35px;margin-right:8px;margin-left:8px;">
                        <span>Tasas</span>
                    </a>
                </li>
                <li>
                    <a href="{{ url_for('clasificador.clasificador_riesgos') }}">
                        <img src="{{ url_for('static', filename='img/vidaley.png') }}"
                             style="width:35px;height:35px;margin-right:8px;margin-left:8px;">
                        <span>Clasificador Riesgos</span>
                    </a>
                </li>
                <li>
                    <a href="{{ url_for('carga.carga') }}">
                        <img src="{{ url_for('static', filename='img/vidaley.png') }}"
                             style="width:35px;height:35px;margin-right:8px;margin-left:8px;">
                        <span>Carga Excel</span>
                    </a>
                </li>
                <li>
                    <a href="{{ url_for('coberturas.coberturas') }}">
                        <img src="{{ url_for('static', filename='img/vidaley.png') }}"
                             style="width:35px;height:35px;margin-right:8px;margin-left:8px;">
                        <span>Coberturas</span>
                    </a>
                </li>
            </ul>
        </nav>
    </div>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
